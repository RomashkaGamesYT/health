<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Healthier</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

<style>

body{
background:
radial-gradient(circle at 20% 20%, #dfe9ff, transparent),
radial-gradient(circle at 80% 30%, #e8f7ff, transparent),
#f6f7fb;
}

.glass{
background:rgba(255,255,255,0.55);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.6);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.dock{
background:rgba(255,255,255,0.5);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.6);
}

</style>

</head>


<body class="text-gray-900 min-h-screen pb-32">


<div class="max-w-5xl mx-auto px-4 py-8">

<header class="flex items-center justify-between mb-8">

<div class="flex items-center gap-3">

<div class="w-10 h-10 glass rounded-xl flex items-center justify-center">
<iconify-icon icon="solar:health-linear" width="24"></iconify-icon>
</div>

<div class="text-2xl font-semibold">
Healthier
</div>

</div>

<div class="glass px-4 py-2 rounded-full text-sm">
1 ХЕ ≈ 10-12 г
</div>

</header>


<input id="searchInput"
class="glass w-full rounded-2xl px-5 py-4 mb-6 outline-none"
placeholder="Найти продукт...">


<div id="foodGrid" class="grid md:grid-cols-2 gap-3 mb-10"></div>



<div class="glass rounded-3xl p-6 mb-8">

<h2 class="text-lg font-semibold mb-4 flex items-center gap-2">

<iconify-icon icon="solar:plate-linear"></iconify-icon>

Моя тарелка

</h2>

<div id="selectedItems" class="space-y-2 mb-4"></div>

<div class="text-lg font-semibold">

Всего: <span id="xeTotal">0</span> ХЕ

</div>

</div>



<div class="glass rounded-3xl p-6">

<h2 class="text-lg font-semibold mb-6 flex items-center gap-2">

<iconify-icon icon="solar:calculator-linear"></iconify-icon>

Калькулятор ХЕ

</h2>

<div class="grid md:grid-cols-3 gap-4">

<input id="carbsInput" type="number"
class="glass rounded-xl px-4 py-3"
placeholder="Углеводы на 100г">

<input id="weightInput" type="number"
class="glass rounded-xl px-4 py-3"
placeholder="Вес (г)">

<select id="xeType" class="glass rounded-xl px-4 py-3">

<option value="10">1 ХЕ = 10г</option>
<option value="12">1 ХЕ = 12г</option>

</select>

</div>

<div class="text-center mt-6">

<div id="xeResult" class="text-4xl font-bold">
0 ХЕ
</div>

</div>

</div>

</div>



<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md dock rounded-3xl px-6 py-3 flex justify-between items-center">

<button class="flex flex-col items-center text-sm">

<iconify-icon icon="solar:home-linear" width="24"></iconify-icon>

Главная

</button>


<button class="flex flex-col items-center text-sm">

<iconify-icon icon="solar:calculator-linear" width="24"></iconify-icon>

ХЕ

</button>


<button class="flex flex-col items-center text-sm">

<iconify-icon icon="solar:chart-linear" width="24"></iconify-icon>

День

</button>


<button class="flex flex-col items-center text-sm">

<iconify-icon icon="solar:user-linear" width="24"></iconify-icon>

Профиль

</button>

</div>



<script>

const foodDatabase = [

{ id:1,name:"Хлеб пшеничный",portion:"1 кусок (20г)",icon:"solar:bread-linear"},
{ id:2,name:"Хлеб ржаной",portion:"1 кусок (25г)",icon:"solar:bread-linear"},

{ id:3,name:"Гречка",portion:"2 ст. ложки (50г)",icon:"solar:plate-linear"},
{ id:4,name:"Рис",portion:"2 ст. ложки (50г)",icon:"solar:plate-linear"},
{ id:5,name:"Макароны",portion:"2 ст. ложки (50г)",icon:"solar:plate-linear"},

{ id:6,name:"Картофель вареный",portion:"1 средний (90г)",icon:"solar:leaf-linear"},

{ id:7,name:"Яблоко",portion:"1 среднее (90г)",icon:"solar:apple-linear"},
{ id:8,name:"Апельсин",portion:"150г",icon:"solar:apple-linear"},
{ id:9,name:"Банан",portion:"70г",icon:"solar:apple-linear"},

{ id:10,name:"Арбуз",portion:"270г",icon:"solar:apple-linear"}

];

const foodGrid=document.getElementById("foodGrid");
const searchInput=document.getElementById("searchInput");

const selectedItems=document.getElementById("selectedItems");
const xeTotal=document.getElementById("xeTotal");

let selected=[];


function renderFood(filter=""){

foodGrid.innerHTML="";

const list=foodDatabase.filter(food =>
food.name.toLowerCase().includes(filter.toLowerCase())
);

list.forEach(food=>{

const card=document.createElement("div");

card.className="glass p-4 rounded-2xl flex justify-between cursor-pointer";

card.onclick=()=>addFood(food);

card.innerHTML=`

<div class="flex gap-3 items-center">

<iconify-icon icon="${food.icon}" width="24"></iconify-icon>

<div>

<div class="font-medium">${food.name}</div>

<div class="text-sm text-gray-500">${food.portion}</div>

</div>

</div>

<iconify-icon icon="solar:add-circle-linear"></iconify-icon>

`;

foodGrid.appendChild(card);

});

}


function addFood(food){

selected.push(food);

renderPlate();

}

function removeFood(index){

selected.splice(index,1);

renderPlate();

}

function renderPlate(){

selectedItems.innerHTML="";

selected.forEach((food,i)=>{

const row=document.createElement("div");

row.className="flex justify-between glass rounded-xl px-3 py-2";

row.innerHTML=`

<div>${food.name}</div>

<button onclick="removeFood(${i})">✕</button>

`;

selectedItems.appendChild(row);

});

xeTotal.innerText=selected.length;

}

searchInput.addEventListener("input",e=>{
renderFood(e.target.value)
});

renderFood();


const carbsInput=document.getElementById("carbsInput");
const weightInput=document.getElementById("weightInput");
const xeType=document.getElementById("xeType");
const xeResult=document.getElementById("xeResult");

function calc(){

const carbs=parseFloat(carbsInput.value);
const weight=parseFloat(weightInput.value);
const xe=parseFloat(xeType.value);

if(!carbs||!weight){
xeResult.innerText="0 ХЕ";
return;
}

const totalCarbs=carbs*weight/100;
const result=totalCarbs/xe;

xeResult.innerText=result.toFixed(2)+" ХЕ";

}

carbsInput.addEventListener("input",calc);
weightInput.addEventListener("input",calc);
xeType.addEventListener("change",calc);

</script>

</body>
</html>

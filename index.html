<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Healthier</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

<style>

body{
font-family:'Unbounded',sans-serif;
background:#f6f7fb;
}

.glass{
background:rgba(255,255,255,.7);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.8);
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.page{display:none}
.page.active{display:block}

.unlock{
animation:unlock .5s;
}

@keyframes unlock{
0%{transform:scale(.6);opacity:0}
100%{transform:scale(1);opacity:1}
}

</style>

</head>

<body class="min-h-screen pb-32">

<div class="max-w-5xl mx-auto px-4 py-8">

<header class="flex justify-between mb-8">

<div class="flex gap-3 items-center">

<div class="glass w-10 h-10 rounded-xl flex items-center justify-center">
❤️
</div>

<div class="text-2xl font-semibold">
Healthier
</div>

</div>

</header>

<!-- HOME -->

<div id="home" class="page active">

<input id="search"
class="glass w-full px-4 py-3 rounded-xl mb-6"
placeholder="Поиск продукта">

<div id="foodGrid" class="grid md:grid-cols-2 gap-3"></div>

</div>

<!-- PLATE -->

<div id="plate" class="page">

<div class="glass p-6 rounded-2xl">

<h2 class="mb-4 font-semibold">
🍽 Тарелка
</h2>

<div id="plateList" class="space-y-2"></div>

<div class="mt-4">
Всего: <span id="xeTotal">0</span> ХЕ
</div>

</div>

</div>

<!-- CALCULATOR -->

<div id="calc" class="page">

<div class="glass p-6 rounded-2xl">

<h2 class="mb-4 font-semibold">
🧮 Калькулятор ХЕ
</h2>

<input id="carbs"
class="glass w-full px-3 py-2 rounded-xl mb-2"
placeholder="углеводы на 100г">

<input id="weight"
class="glass w-full px-3 py-2 rounded-xl mb-2"
placeholder="вес (г или мл)">

<select id="xeType"
class="glass w-full px-3 py-2 rounded-xl mb-3">

<option value="10">1 ХЕ = 10г</option>
<option value="12">1 ХЕ = 12г</option>

</select>

<button onclick="calcXE()"
class="glass px-4 py-2 rounded-xl">

Посчитать

</button>

<div id="xeResult" class="mt-4 text-xl font-semibold">
0 ХЕ
</div>

</div>

</div>

<!-- SUGAR -->

<div id="sugar" class="page">

<div class="glass p-6 rounded-2xl">

<h2 class="mb-4 font-semibold">
📊 График сахара
</h2>

<input type="time" id="sTime"
class="glass w-full px-3 py-2 rounded-xl mb-2">

<input id="sValue"
class="glass w-full px-3 py-2 rounded-xl mb-2"
placeholder="уровень сахара">

<input id="sText"
class="glass w-full px-3 py-2 rounded-xl mb-3"
placeholder="комментарий">

<button onclick="addSugar()"
class="glass px-4 py-2 rounded-xl">

Добавить

</button>

<div id="sugarList" class="mt-4 space-y-2"></div>

</div>

</div>

<!-- PROFILE -->

<div id="profile" class="page">

<div class="glass p-6 rounded-2xl text-center">

<img id="avatar"
src="https://i.imgur.com/2DhmtJ4.png"
class="w-24 h-24 rounded-full mx-auto mb-4">

<input type="file" id="avatarUpload">

<input id="name"
class="glass w-full px-3 py-2 rounded-xl mb-2"
placeholder="Имя">

<input id="goal"
class="glass w-full px-3 py-2 rounded-xl mb-3"
placeholder="Цель ХЕ">

<button onclick="saveProfile()"
class="glass px-4 py-2 rounded-xl">

Сохранить

</button>

</div>

<div class="glass p-6 rounded-2xl mt-6">

<h3 class="font-semibold mb-3">
🏆 Достижения
</h3>

<div id="achievements" class="space-y-2">

<div id="achEat">🍔 Маленький Обжора</div>
<div id="achSugar">📈 Сахарный график</div>

</div>

</div>

</div>

</div>

<!-- DOCK -->

<div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white px-6 py-3 rounded-3xl shadow flex gap-6">

<button onclick="openPage('home')">🏠</button>
<button onclick="openPage('plate')">🍽</button>
<button onclick="openPage('calc')">🧮</button>
<button onclick="openPage('sugar')">📊</button>
<button onclick="openPage('profile')">👤</button>

</div>

<script>

function openPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

const foods=[
{name:"Яблоко",xe:"90г = 1 ХЕ",carbs:11},
{name:"Банан",xe:"70г = 1 ХЕ",carbs:23},
{name:"Хлеб",xe:"20г = 1 ХЕ",carbs:48},
{name:"Рис",xe:"50г = 1 ХЕ",carbs:77}
]

let plate=[]

function renderFoods(){

foodGrid.innerHTML=""

foods.forEach(f=>{

const card=document.createElement("div")

card.className="glass p-4 rounded-xl flex justify-between"

card.innerHTML=`
<div>
<div>${f.name}</div>
<div class="text-sm">${f.xe}</div>
<div class="text-xs text-gray-500">${f.carbs}г углеводов</div>
</div>

<button onclick="addFood('${f.name}')">➕</button>
`

foodGrid.appendChild(card)

})

}

renderFoods()

function addFood(name){

plate.push(name)

if(plate.length>=10){

unlock("achEat")

}

renderPlate()

}

function renderPlate(){

plateList.innerHTML=""

plate.forEach((p,i)=>{

plateList.innerHTML+=`
<div class="glass px-3 py-2 rounded-xl flex justify-between">
${p}
<button onclick="removeFood(${i})">❌</button>
</div>
`

})

xeTotal.innerText=plate.length

}

function removeFood(i){

plate.splice(i,1)

renderPlate()

}

function calcXE(){

const carbs=document.getElementById("carbs").value
const weight=document.getElementById("weight").value
const xe=document.getElementById("xeType").value

const total=(carbs*weight/100)/xe

xeResult.innerText=total.toFixed(2)+" ХЕ"

}

let sugar=[]

function addSugar(){

const t=sTime.value
const v=sValue.value
const txt=sText.value

sugar.push({t,v,txt})

if(sugar.length>=5){

unlock("achSugar")

}

renderSugar()

}

function renderSugar(){

sugarList.innerHTML=""

sugar.forEach(s=>{

sugarList.innerHTML+=`
<div class="glass px-3 py-2 rounded-xl">
${s.t} — ${s.v} — ${s.txt}
</div>
`

})

}

function unlock(id){

document.getElementById(id).classList.add("unlock")

}

function saveProfile(){

localStorage.setItem("name",name.value)
localStorage.setItem("goal",goal.value)

}

</script>

</body>
  </html>

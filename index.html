<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Healthier</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

<style>

body{
font-family:'Unbounded',sans-serif;
background:
radial-gradient(circle at 20% 20%, #dfe9ff, transparent),
radial-gradient(circle at 80% 30%, #e8f7ff, transparent),
#f6f7fb;
}

.glass{
background:rgba(255,255,255,0.55);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.6);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:.3s;
}

.dock{
background:rgba(255,255,255,0.55);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.7);
}

.page{
display:none;
opacity:0;
transform:translateY(20px);
transition:.4s;
}

.page.active{
display:block;
opacity:1;
transform:translateY(0);
}

.addAnim{
animation:add .4s;
}

@keyframes add{
0%{transform:scale(.8)}
70%{transform:scale(1.05)}
100%{transform:scale(1)}
}

.unlock{
animation:unlock .6s;
}

@keyframes unlock{
0%{transform:scale(.5);opacity:0}
100%{transform:scale(1);opacity:1}
}

</style>

</head>

<body class="min-h-screen text-gray-900 pb-32">

<div class="max-w-5xl mx-auto px-4 py-8">

<header class="flex justify-between mb-8">

<div class="flex items-center gap-3">

<div class="glass w-10 h-10 rounded-xl flex items-center justify-center">
<iconify-icon icon="solar:health-linear"></iconify-icon>
</div>

<div class="text-2xl font-semibold">
Healthier
</div>

</div>

<div class="glass px-4 py-2 rounded-full text-sm">
1 ХЕ ≈ 10-12 г
</div>

</header>

<!-- HOME -->

<div id="home" class="page active">

<input id="searchInput"
class="glass w-full rounded-2xl px-5 py-4 mb-6"
placeholder="Найти продукт...">

<div id="foodGrid" class="grid md:grid-cols-2 gap-3"></div>

</div>

<!-- PLATE -->

<div id="platePage" class="page">

<div class="glass rounded-3xl p-6">

<h2 class="mb-4 flex gap-2 items-center">
<iconify-icon icon="solar:plate-linear"></iconify-icon>
Моя тарелка
</h2>

<div id="selectedItems" class="space-y-2 mb-4"></div>

<div class="font-semibold">
Всего: <span id="xeTotal">0</span> ХЕ
</div>

</div>

</div>

<!-- SUGAR GRAPH -->

<div id="sugarPage" class="page">

<div class="glass rounded-3xl p-6">

<h2 class="mb-4 flex gap-2 items-center">
<iconify-icon icon="solar:chart-linear"></iconify-icon>
График сахара
</h2>

<div class="grid md:grid-cols-3 gap-2 mb-4">

<input id="sugarTime" type="time"
class="glass rounded-xl px-3 py-2">

<input id="sugarValue" type="number"
class="glass rounded-xl px-3 py-2"
placeholder="сахар">

<input id="sugarText"
class="glass rounded-xl px-3 py-2"
placeholder="комментарий">

</div>

<button onclick="addSugar()"
class="glass px-4 py-2 rounded-xl mb-4">
Добавить
</button>

<div id="sugarList" class="space-y-2"></div>

</div>

</div>

<!-- PROFILE -->

<div id="profilePage" class="page">

<div class="glass rounded-3xl p-6 text-center">

<img id="avatar"
src="https://i.imgur.com/2DhmtJ4.png"
class="w-24 h-24 rounded-full mx-auto mb-4">

<input type="file" id="avatarInput" hidden>

<button onclick="avatarInput.click()"
class="glass px-3 py-1 rounded-xl mb-4">
Изменить фото
</button>

<div class="text-xl font-semibold" id="profileNameText">
Пользователь
</div>

</div>

<div class="glass rounded-3xl p-6 mt-6">

<h3 class="mb-3 font-semibold">
Достижения
</h3>

<div class="flex gap-3">

<div id="achFood" class="glass px-3 py-2 rounded-xl">
Маленький Обжора
</div>

<div id="achSugar" class="glass px-3 py-2 rounded-xl">
Сахарный график
</div>

</div>

</div>

</div>

</div>

<!-- DOCK -->

<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md dock rounded-3xl px-6 py-3 flex justify-between">

<button onclick="openPage('home')">
<iconify-icon icon="solar:home-linear" width="24"></iconify-icon>
</button>

<button onclick="openPage('platePage')">
<iconify-icon icon="solar:plate-linear" width="24"></iconify-icon>
</button>

<button onclick="openPage('sugarPage')">
<iconify-icon icon="solar:chart-linear" width="24"></iconify-icon>
</button>

<button onclick="openPage('profilePage')">
<iconify-icon icon="solar:user-linear" width="24"></iconify-icon>
</button>

</div>

<script>

function openPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

const foods=[
{name:"Хлеб"},
{name:"Гречка"},
{name:"Рис"},
{name:"Картофель"},
{name:"Яблоко"},
{name:"Банан"}
]

const foodGrid=document.getElementById("foodGrid")
const selectedItems=document.getElementById("selectedItems")

let selected=[]

function renderFood(){

foods.forEach(food=>{

const card=document.createElement("div")

card.className="glass p-4 rounded-2xl flex justify-between cursor-pointer"

card.onclick=()=>addFood(food)

card.innerHTML=`
<div>${food.name}</div>
<iconify-icon icon="solar:add-circle-linear"></iconify-icon>
`

foodGrid.appendChild(card)

})

}

renderFood()

function addFood(food){

selected.push(food)

renderPlate()

if(selected.length>=10){

unlock("achFood")

}

}

function renderPlate(){

selectedItems.innerHTML=""

selected.forEach((f,i)=>{

const row=document.createElement("div")

row.className="glass rounded-xl px-3 py-2 flex justify-between addAnim"

row.innerHTML=`
<div>${f.name}</div>
<button onclick="removeFood(${i})">✕</button>
`

selectedItems.appendChild(row)

})

xeTotal.innerText=selected.length

}

function removeFood(i){

selected.splice(i,1)
renderPlate()

}

let sugars=[]

function addSugar(){

const time=sugarTime.value
const val=sugarValue.value
const text=sugarText.value

const obj={time,val,text}

sugars.push(obj)

renderSugar()

if(sugars.length>=5){

unlock("achSugar")

}

}

function renderSugar(){

sugarList.innerHTML=""

sugars.forEach(s=>{

const row=document.createElement("div")

row.className="glass px-3 py-2 rounded-xl"

row.innerText=s.time+" — "+s.val+" — "+s.text

sugarList.appendChild(row)

})

}

function unlock(id){

const el=document.getElementById(id)

el.classList.add("unlock")

}

</script>

</body>
</html>

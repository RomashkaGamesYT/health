<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthier</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<style>
body {
  font-family:'Unbounded',sans-serif;
  background:
    radial-gradient(circle at 20% 20%, #dfe9ff, transparent),
    radial-gradient(circle at 80% 30%, #e8f7ff, transparent),
    #f6f7fb;
}
.glass {
  background:rgba(255,255,255,0.55);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition: all 0.25s cubic-bezier(.25,.8,.25,1);
}
.glass:hover { transform:translateY(-3px) scale(1.01); }
.dock {
  background:rgba(255,255,255,0.55);
  backdrop-filter: blur(30px);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:2rem;
  padding:0.5rem 1rem;
  display:flex;
  justify-content:space-between;
  gap:0.5rem;
}
.page { display:none; opacity:0; transform:translateY(12px); transition:all .35s cubic-bezier(.34,1.56,.64,1); }
.page.active { display:block; opacity:1; transform:translateY(0); }
.gift {
  width:70px; height:70px; border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  font-size:28px; background:rgba(255,255,255,.6);
  backdrop-filter:blur(10px); cursor:pointer;
}
#giftInfo { position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,0.9); padding:1rem; display:none; text-align:center; border-top:1px solid #ccc; }
</style>
</head>
<body class="min-h-screen text-gray-900 pb-32">

<div class="max-w-5xl mx-auto px-4 py-8">
<header class="flex justify-between items-center mb-8">
<div class="flex items-center gap-3">
<div class="w-10 h-10 glass rounded-xl flex items-center justify-center">
<iconify-icon icon="solar:health-linear"></iconify-icon>
</div>
<div class="text-2xl font-semibold">Healthier</div>
</div>
<div class="glass px-4 py-2 rounded-full text-sm">1 ХЕ ≈ 10-12 г</div>
</header>

<!-- HOME -->
<div id="home" class="page active">
<input id="searchInput" class="glass w-full rounded-2xl px-5 py-4 mb-6 outline-none" placeholder="Найти продукт...">
<div id="foodGrid" class="grid md:grid-cols-2 gap-3"></div>
</div>

<!-- PLATE -->
<div id="platePage" class="page">
<div class="glass rounded-3xl p-6">
<h2 class="mb-4 text-lg flex items-center gap-2">
<iconify-icon icon="solar:plate-linear"></iconify-icon>Моя тарелка
</h2>
<div id="selectedItems" class="space-y-2 mb-4"></div>
<div class="text-lg font-semibold">Всего: <span id="xeTotal">0</span> ХЕ</div>
</div>
</div>

<!-- CALCULATOR -->
<div id="calculatorPage" class="page">
<div class="glass rounded-3xl p-6">
<h2 class="text-lg mb-4 flex items-center gap-2">
<iconify-icon icon="solar:calculator-linear"></iconify-icon>Калькулятор ХЕ
</h2>
<div class="grid md:grid-cols-3 gap-3">
<input id="carbsInput" type="number" class="glass rounded-xl px-3 py-3" placeholder="Углеводы на 100г">
<input id="weightInput" type="number" class="glass rounded-xl px-3 py-3" placeholder="Вес (г)">
<select id="xeType" class="glass rounded-xl px-3 py-3">
<option value="10">1 ХЕ = 10г</option>
<option value="12">1 ХЕ = 12г</option>
</select>
</div>
<div class="text-center mt-6">
<div id="xeResult" class="text-4xl font-bold">0 ХЕ</div>
</div>
</div>
</div>

<!-- PROFILE -->
<div id="profilePage" class="page">
<div class="glass rounded-3xl p-6 text-center">
<img id="avatar" src="https://i.imgur.com/2DhmtJ4.png" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover">
<input type="file" id="avatarInput" hidden>
<button onclick="avatarInput.click()" class="glass px-3 py-1 rounded-xl mb-4 text-sm">Изменить фото</button>
<div id="profileInfo">
<div class="text-xl font-semibold" id="profileNameText">Пользователь</div>
<div class="text-gray-500 mb-4" id="profileTargetText">Цель: 0 ХЕ</div>
<button onclick="editProfile()" class="glass px-4 py-2 rounded-xl">Редактировать</button>
</div>
<div id="profileEdit" style="display:none">
<input id="profileName" class="glass rounded-xl px-3 py-2 w-full mb-2" placeholder="Имя">
<input id="profileTarget" class="glass rounded-xl px-3 py-2 w-full mb-4" placeholder="Цель ХЕ">
<button onclick="saveProfile()" class="glass px-4 py-2 rounded-xl">Сохранить</button>
</div>

<div class="glass rounded-3xl p-6 mt-6">
<h3 class="mb-4 font-semibold">Подарки</h3>
<div class="flex gap-3">
<div class="gift" data-title="Маленький Обжора" data-desc="Перестал переедать!" data-img="gift1_burger.png">🍔</div>
<div class="gift" data-title="Порядок дня!" data-desc="Выполнил все правильно!" data-img="gift2_trophy.png">🏆</div>
</div>
</div>
</div>

<div id="giftInfo"></div>
</div>

<!-- DOCK -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md dock flex justify-between">
<button onclick="openPage('home')" class="flex flex-col items-center text-xs">
<iconify-icon icon="solar:home-linear" width="24"></iconify-icon>Главная
</button>
<button onclick="openPage('calculatorPage')" class="flex flex-col items-center text-xs">
<iconify-icon icon="solar:calculator-linear" width="24"></iconify-icon>ХЕ
</button>
<button onclick="openPage('platePage')" class="flex flex-col items-center text-xs">
<iconify-icon icon="solar:plate-linear" width="24"></iconify-icon>День
</button>
<button onclick="openPage('profilePage')" class="flex flex-col items-center text-xs">
<iconify-icon icon="solar:user-linear" width="24"></iconify-icon>Профиль
</button>
</div>

<script>
// страницы
function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// продукты
const foodDatabase=[
{name:"Белый хлеб",portion:"1 кусок (20г)",carbs:10,icon:"solar:bread-linear"},
{name:"Ржаной хлеб",portion:"1 кусок (25г)",carbs:12,icon:"solar:bread-linear"},
{name:"Бородинский хлеб",portion:"1 кусок (25г)",carbs:12,icon:"solar:bread-linear"},
{name:"Диетические хлебцы",portion:"2 шт. (15г)",carbs:10,icon:"solar:bread-linear"},
{name:"Сухари",portion:"2 шт. (15г)",carbs:10,icon:"solar:bread-linear"},
{name:"Батон",portion:"20г",carbs:10,icon:"solar:bread-linear"},
{name:"Лаваш",portion:"25г",carbs:12,icon:"solar:bread-linear"},
{name:"Булочка сдобная",portion:"15г",carbs:10,icon:"solar:bread-linear"},
{name:"Гречка",portion:"50г",carbs:12,icon:"solar:plate-linear"},
{name:"Рис",portion:"50г",carbs:12,icon:"solar:plate-linear"},
{name:"Макароны",portion:"50г",carbs:12,icon:"solar:plate-linear"},
{name:"Картофель отварной",portion:"65г",carbs:10,icon:"solar:leaf-linear"},
{name:"Яблоко",portion:"100г",carbs:10,icon:"solar:apple-linear"},
{name:"Банан",portion:"70г",carbs:10,icon:"solar:apple-linear"},
// добавьте остальные продукты аналогично
];

const foodGrid=document.getElementById("foodGrid");
const searchInput=document.getElementById("searchInput");
const selectedItems=document.getElementById("selectedItems");
const xeTotal=document.getElementById("xeTotal");
let selected=[];

// отображение продуктов
function renderFood(filter=""){
  foodGrid.innerHTML="";
  const list=foodDatabase.filter(f=>f.name.toLowerCase().includes(filter.toLowerCase()));
  list.forEach(food=>{
    const card=document.createElement("div");
    card.className="glass p-4 rounded-2xl flex justify-between cursor-pointer";
    card.onclick=()=>addFood(food);
    card.innerHTML=`
      <div class="flex gap-3 items-center">
        <iconify-icon icon="${food.icon}" width="24"></iconify-icon>
        <div><div class="font-medium">${food.name}</div><div class="text-sm text-gray-500">${food.portion} = 1 ХЕ</div></div>
      </div>
      <iconify-icon icon="solar:add-circle-linear"></iconify-icon>
    `;
    foodGrid.appendChild(card);
  });
}

function addFood(food){
  selected.push(food); renderPlate(); checkAchievements();
}

function removeFood(i){ selected.splice(i,1); renderPlate(); }

function renderPlate(){
  selectedItems.innerHTML="";
  let total=0;
  selected.forEach((f,i)=>{
    const row=document.createElement("div");
    row.className="glass rounded-xl px-3 py-2 flex justify-between";
    row.innerHTML=`<div>${f.name}</div><button onclick="removeFood(${i})">✕</button>`;
    selectedItems.appendChild(row);
    if(f.carbs) total+=1; // 1 ХЕ на порцию
  });
  xeTotal.innerText=total.toFixed(1);
}

// поиск
searchInput.addEventListener("input",e=>renderFood(e.target.value));
renderFood();

// калькулятор
const carbsInput=document.getElementById("carbsInput");
const weightInput=document.getElementById("weightInput");
const xeType=document.getElementById("xeType");
const xeResult=document.getElementById("xeResult");

function calc(){
  const carbs=parseFloat(carbsInput.value);
  const weight=parseFloat(weightInput.value);
  const xe=parseFloat(xeType.value);
  if(!carbs||!weight){ xeResult.innerText="0 ХЕ"; return; }
  const result=(carbs*weight/100)/xe;
  xeResult.innerText=result.toFixed(1)+" ХЕ";
}

carbsInput.addEventListener("input",calc);
weightInput.addEventListener("input",calc);
xeType.addEventListener("change",calc);

// профиль
const avatar=document.getElementById("avatar");
const avatarInput=document.getElementById("avatarInput");
const profileInfo=document.getElementById("profileInfo");
const profileEdit=document.getElementById("profileEdit");
const profileName=document.getElementById("profileName");
const profileTarget=document.getElementById("profileTarget");
const profileNameText=document.getElementById("profileNameText");
const profileTargetText=document.getElementById("profileTargetText");

avatarInput.onchange=function(){
  const file=this.files[0];
  const reader=new FileReader();
  reader.onload=function(e){ avatar.src=e.target.result; localStorage.setItem("avatar",e.target.result); }
  reader.readAsDataURL(file);
}

function editProfile(){ profileInfo.style.display="none"; profileEdit.style.display="block"; }
function saveProfile(){
  localStorage.setItem("name",profileName.value);
  localStorage.setItem("target",profileTarget.value);
  loadProfile(); profileEdit.style.display="none"; profileInfo.style.display="block";
}
function loadProfile(){
  profileNameText.innerText=localStorage.getItem("name")||"Пользователь";
  profileTargetText.innerText="Цель: "+(localStorage.getItem("target")||0)+" ХЕ";
  profileName.value=localStorage.getItem("name")||"";
  profileTarget.value=localStorage.getItem("target")||"";
  if(localStorage.getItem("avatar")) avatar.src=localStorage.getItem("avatar");
}
loadProfile();

// подарки
const giftInfo=document.getElementById("giftInfo");
document.querySelectorAll(".gift").forEach(g=>{
  g.addEventListener("click",()=>{
    giftInfo.innerHTML=`<img src="${g.dataset.img}" style="width:60px;height:60px;"><div class="font-semibold">${g.dataset.title}</div><div>${g.dataset.desc}</div>`;
    giftInfo.style.display="block";
    setTimeout(()=>{ giftInfo.style.display="none"; },4000);
  });
});

// достижения (пример)
function checkAchievements(){
  const allCorrect=selected.every(f=>f.carbs); // если только углеводы
  if(allCorrect && !localStorage.getItem("achievement_order")){
    localStorage.setItem("achievement_order","done");
    alert("Достижение получено: Порядок дня!");
  }
}
</script>

</body>
</html>

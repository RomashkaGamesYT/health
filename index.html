<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Healthier</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

<style>

body{
font-family:'Unbounded',sans-serif;

background:
radial-gradient(circle at 20% 20%, #dfe9ff, transparent),
radial-gradient(circle at 80% 30%, #e8f7ff, transparent),
#f6f7fb;
}

.glass{
background:rgba(255,255,255,0.55);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.6);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.25s;
}

.glass:hover{
transform:translateY(-2px);
}

.dock{
background:rgba(255,255,255,0.55);
backdrop-filter: blur(30px);
border:1px solid rgba(255,255,255,0.7);
}

.page{
display:none;
opacity:0;
transform:translateY(10px);
transition:0.35s;
}

.page.active{
display:block;
opacity:1;
transform:translateY(0);
}

</style>

</head>

<body class="min-h-screen text-gray-900 pb-32">

<div class="max-w-5xl mx-auto px-4 py-8">

<header class="flex justify-between items-center mb-8">

<div class="flex items-center gap-3">

<div class="w-10 h-10 glass rounded-xl flex items-center justify-center">
<iconify-icon icon="solar:health-linear"></iconify-icon>
</div>

<div class="text-2xl font-semibold">Healthier</div>

</div>

<div class="glass px-4 py-2 rounded-full text-sm">
1 ХЕ ≈ 10-12 г
</div>

</header>

<!-- HOME -->
<div id="home" class="page active">

<input id="searchInput"
class="glass w-full rounded-2xl px-5 py-4 mb-6 outline-none"
placeholder="Найти продукт...">

<div id="foodGrid" class="grid md:grid-cols-2 gap-3"></div>

</div>


<!-- PLATE -->
<div id="platePage" class="page">

<div class="glass rounded-3xl p-6">

<h2 class="mb-4 text-lg flex items-center gap-2">

<iconify-icon icon="solar:plate-linear"></iconify-icon>
Моя тарелка

</h2>

<div id="selectedItems" class="space-y-2 mb-4"></div>

<div class="text-lg font-semibold">
Всего: <span id="xeTotal">0</span> ХЕ
</div>

</div>

</div>


<!-- CALCULATOR -->
<div id="calculatorPage" class="page">

<div class="glass rounded-3xl p-6">

<h2 class="text-lg mb-4 flex gap-2 items-center">

<iconify-icon icon="solar:calculator-linear"></iconify-icon>
Калькулятор ХЕ

</h2>

<select id="calcMode" class="glass rounded-xl px-3 py-2 mb-4">

<option value="food">Готовый продукт</option>
<option value="liquid">Жидкость (мл)</option>

</select>

<div class="grid md:grid-cols-3 gap-3">

<input id="carbsInput" type="number"
class="glass rounded-xl px-3 py-3"
placeholder="углеводы на 100">

<input id="weightInput" type="number"
class="glass rounded-xl px-3 py-3"
placeholder="вес / мл">

<select id="xeType" class="glass rounded-xl px-3 py-3">

<option value="10">1 ХЕ = 10г</option>
<option value="12">1 ХЕ = 12г</option>

</select>

</div>

<div class="text-center mt-6">

<div id="xeResult" class="text-4xl font-bold">
0 ХЕ
</div>

</div>

</div>

</div>


<!-- PROFILE -->
<div id="profilePage" class="page">

<div class="glass rounded-3xl p-6">

<h2 class="text-lg mb-4">Профиль</h2>

<label class="text-sm text-gray-500">Имя</label>

<input id="profileName"
class="glass rounded-xl px-3 py-2 w-full mb-3">

<label class="text-sm text-gray-500">Цель ХЕ в день</label>

<input id="profileTarget"
class="glass rounded-xl px-3 py-2 w-full mb-4">

<button onclick="saveProfile()"
class="glass px-4 py-2 rounded-xl">

Сохранить

</button>

</div>

</div>

</div>



<!-- DOCK -->

<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md dock rounded-3xl px-6 py-3 flex justify-between">

<button onclick="openPage('home')" class="flex flex-col items-center text-xs">

<iconify-icon icon="solar:home-linear" width="24"></iconify-icon>
Главная

</button>

<button onclick="openPage('calculatorPage')" class="flex flex-col items-center text-xs">

<iconify-icon icon="solar:calculator-linear" width="24"></iconify-icon>
ХЕ

</button>

<button onclick="openPage('platePage')" class="flex flex-col items-center text-xs">

<iconify-icon icon="solar:plate-linear" width="24"></iconify-icon>
День

</button>

<button onclick="openPage('profilePage')" class="flex flex-col items-center text-xs">

<iconify-icon icon="solar:user-linear" width="24"></iconify-icon>
Профиль

</button>

</div>



<script>

function openPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}



const foods=[
{name:"Хлеб",portion:"1 кусок",icon:"solar:bread-linear"},
{name:"Гречка",portion:"50г",icon:"solar:plate-linear"},
{name:"Рис",portion:"50г",icon:"solar:plate-linear"},
{name:"Картофель",portion:"90г",icon:"solar:leaf-linear"},
{name:"Яблоко",portion:"90г",icon:"solar:apple-linear"},
{name:"Апельсин",portion:"150г",icon:"solar:apple-linear"},
{name:"Банан",portion:"70г",icon:"solar:apple-linear"}
]

const foodGrid=document.getElementById("foodGrid")
const searchInput=document.getElementById("searchInput")

const selectedItems=document.getElementById("selectedItems")
const xeTotal=document.getElementById("xeTotal")

let selected=[]



function renderFood(filter=""){

foodGrid.innerHTML=""

foods.filter(f=>f.name.toLowerCase().includes(filter.toLowerCase()))
.forEach(food=>{

const card=document.createElement("div")

card.className="glass p-4 rounded-2xl flex justify-between cursor-pointer"

card.onclick=()=>addFood(food)

card.innerHTML=`

<div class="flex gap-3">

<iconify-icon icon="${food.icon}" width="24"></iconify-icon>

<div>

<div>${food.name}</div>
<div class="text-sm text-gray-500">${food.portion} = 1 ХЕ</div>

</div>

</div>

<iconify-icon icon="solar:add-circle-linear"></iconify-icon>

`

foodGrid.appendChild(card)

})

}



function addFood(food){

selected.push(food)

renderPlate()

}



function removeFood(i){

selected.splice(i,1)

renderPlate()

}



function renderPlate(){

selectedItems.innerHTML=""

selected.forEach((f,i)=>{

const row=document.createElement("div")

row.className="glass rounded-xl px-3 py-2 flex justify-between"

row.innerHTML=`

<div>${f.name}</div>
<button onclick="removeFood(${i})">✕</button>

`

selectedItems.appendChild(row)

})

xeTotal.innerText=selected.length

}



searchInput.addEventListener("input",e=>renderFood(e.target.value))

renderFood()



const carbsInput=document.getElementById("carbsInput")
const weightInput=document.getElementById("weightInput")
const xeType=document.getElementById("xeType")
const xeResult=document.getElementById("xeResult")

function calc(){

const carbs=parseFloat(carbsInput.value)
const weight=parseFloat(weightInput.value)
const xe=parseFloat(xeType.value)

if(!carbs||!weight){
xeResult.innerText="0 ХЕ"
return
}

const total=carbs*weight/100
const result=total/xe

xeResult.innerText=result.toFixed(2)+" ХЕ"

}

carbsInput.addEventListener("input",calc)
weightInput.addEventListener("input",calc)
xeType.addEventListener("change",calc)



function saveProfile(){

localStorage.setItem("name",document.getElementById("profileName").value)
localStorage.setItem("target",document.getElementById("profileTarget").value)

alert("Сохранено")

}



function loadProfile(){

document.getElementById("profileName").value=localStorage.getItem("name")||""
document.getElementById("profileTarget").value=localStorage.getItem("target")||""

}

loadProfile()

</script>

</body>
</html>

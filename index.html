<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthier</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

</head>

<body class="bg-[#fafafa] text-gray-900 font-sans antialiased min-h-screen pb-28">

<div class="max-w-6xl mx-auto px-4 py-10">

<header class="flex items-center justify-between mb-10">
<div class="flex items-center gap-3">

<div class="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center text-white">
<iconify-icon icon="solar:health-linear"></iconify-icon>
</div>

<div class="text-2xl font-semibold">
Healthier
</div>

</div>

<div class="text-sm text-gray-500 bg-white border px-4 py-2 rounded-full">
1 ХЕ ≈ 10-12 г углеводов
</div>

</header>


<input id="searchInput"
class="w-full border rounded-xl px-4 py-3 mb-6"
placeholder="Найти продукт...">


<div id="foodGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>

</div>


<script>

const foodDatabase = [

/* ХЛЕБ */

{ id:1, name:"Хлеб пшеничный", portion:"1 кусок (20г)", category:"Хлеб", icon:"solar:bread-linear"},
{ id:2, name:"Хлеб ржаной", portion:"1 кусок (25г)", category:"Хлеб", icon:"solar:bread-linear"},
{ id:3, name:"Хлеб бородинский", portion:"1 кусок (25г)", category:"Хлеб", icon:"solar:bread-linear"},
{ id:4, name:"Батон", portion:"1 кусок (20г)", category:"Хлеб", icon:"solar:bread-linear"},
{ id:5, name:"Сухари", portion:"15 г", category:"Хлеб", icon:"solar:bread-linear"},

/* КРУПЫ */

{ id:10, name:"Гречневая крупа", portion:"1 ст. ложка (15г)", category:"Крупы", icon:"solar:plate-linear"},
{ id:11, name:"Рис", portion:"1 ст. ложка (15г)", category:"Крупы", icon:"solar:plate-linear"},
{ id:12, name:"Манка", portion:"1 ст. ложка (15г)", category:"Крупы", icon:"solar:plate-linear"},
{ id:13, name:"Овсянка", portion:"2 ст. ложки (20г)", category:"Крупы", icon:"solar:plate-linear"},
{ id:14, name:"Пшено", portion:"1 ст. ложка (15г)", category:"Крупы", icon:"solar:plate-linear"},
{ id:15, name:"Перловка", portion:"1 ст. ложка (15г)", category:"Крупы", icon:"solar:plate-linear"},
{ id:16, name:"Кукурузная крупа", portion:"1 ст. ложка (15г)", category:"Крупы", icon:"solar:plate-linear"},
{ id:17, name:"Макароны", portion:"1 ст. ложка (15г)", category:"Крупы", icon:"solar:plate-linear"},

/* ОВОЩИ */

{ id:30, name:"Картофель вареный", portion:"1 средний (90г)", category:"Овощи", icon:"solar:leaf-linear"},
{ id:31, name:"Картофельное пюре", portion:"75 г", category:"Овощи", icon:"solar:leaf-linear"},
{ id:32, name:"Жареный картофель", portion:"35 г", category:"Овощи", icon:"solar:leaf-linear"},
{ id:33, name:"Горох", portion:"50 г", category:"Овощи", icon:"solar:leaf-linear"},

/* ФРУКТЫ */

{ id:50, name:"Абрикосы", portion:"110 г", category:"Фрукты", icon:"solar:apple-linear"},
{ id:51, name:"Айва", portion:"140 г", category:"Фрукты", icon:"solar:apple-linear"},
{ id:52, name:"Апельсин", portion:"150 г", category:"Фрукты", icon:"solar:apple-linear"},
{ id:53, name:"Арбуз", portion:"270 г", category:"Фрукты", icon:"solar:apple-linear"},
{ id:54, name:"Банан", portion:"70 г", category:"Фрукты", icon:"solar:apple-linear"},
{ id:55, name:"Виноград", portion:"70 г", category:"Фрукты", icon:"solar:apple-linear"},
{ id:56, name:"Груша", portion:"90 г", category:"Фрукты", icon:"solar:apple-linear"},
{ id:57, name:"Гранат", portion:"170 г", category:"Фрукты", icon:"solar:apple-linear"},
{ id:58, name:"Грейпфрут", portion:"170 г", category:"Фрукты", icon:"solar:apple-linear"},
{ id:59, name:"Дыня", portion:"100 г", category:"Фрукты", icon:"solar:apple-linear"},
{ id:60, name:"Яблоко", portion:"90 г", category:"Фрукты", icon:"solar:apple-linear"},

/* ЯГОДЫ */

{ id:70, name:"Брусника", portion:"140 г", category:"Ягоды", icon:"solar:leaf-linear"},
{ id:71, name:"Черника", portion:"90 г", category:"Ягоды", icon:"solar:leaf-linear"},
{ id:72, name:"Малина", portion:"160 г", category:"Ягоды", icon:"solar:leaf-linear"},

/* СЛАДКОЕ */

{ id:80, name:"Сахар", portion:"10 г", category:"Сладкое", icon:"solar:cup-linear"},
{ id:81, name:"Мёд", portion:"12 г", category:"Сладкое", icon:"solar:cup-linear"},
{ id:82, name:"Шоколад", portion:"20 г", category:"Сладкое", icon:"solar:cup-linear"},
{ id:83, name:"Печенье", portion:"15 г", category:"Сладкое", icon:"solar:cup-linear"},

/* НАПИТКИ */

{ id:90, name:"Молоко", portion:"250 мл", category:"Напитки", icon:"solar:bottle-linear"},
{ id:91, name:"Кефир", portion:"250 мл", category:"Напитки", icon:"solar:bottle-linear"},
{ id:92, name:"Фруктовый сок", portion:"100 мл", category:"Напитки", icon:"solar:glass-water-linear"},
{ id:93, name:"Томатный сок", portion:"250 мл", category:"Напитки", icon:"solar:glass-water-linear"}

];


const foodGrid = document.getElementById("foodGrid");
const searchInput = document.getElementById("searchInput");


function renderFoodList(filter=""){

foodGrid.innerHTML="";

const filtered = foodDatabase.filter(food =>
food.name.toLowerCase().includes(filter.toLowerCase())
);

filtered.forEach(food =>{

const card=document.createElement("div");

card.className="flex items-center justify-between p-3 border bg-white rounded-xl cursor-pointer";

card.innerHTML=`

<div class="flex gap-3 items-center">

<iconify-icon icon="${food.icon}" width="24"></iconify-icon>

<div>

<div class="font-medium">${food.name}</div>

<div class="text-sm text-gray-500">${food.portion} = 1 ХЕ</div>

</div>

</div>

`;

foodGrid.appendChild(card);

});

}


searchInput.addEventListener("input", e=>{
renderFoodList(e.target.value)
})


renderFoodList();

</script>

</body>
</html>
